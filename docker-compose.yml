version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    ports:
      - "5000:5000"

    environment:
      MONGODB_URI: mongodb://mongo:27017/mentecart
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 1d
      PORT: 5000
      NODE_ENV: production
      BCRYPT_SALT_ROUNDS: 10
      CART_EXPIRY_HOURS: 24
      MAX_BOOKINGS_PER_DAY: 5
      CORS_ORIGIN: "*"

      PAYHERE_MERCHANT_ID: 1214993
      PAYHERE_SECRET: dummy_sandbox_secret
      WEBHOOK_SECRET: my_custom_webhook_secret
      PAYHERE_API_URL: https://sandbox.payhere.lk/pay/checkout

    depends_on:
      - mongo

  mongo:
    image: mongo:6.0

    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: