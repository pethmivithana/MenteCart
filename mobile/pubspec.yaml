name: mentecart
description: MenteCart - Service Booking Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.3+1

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^14.1.4

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  injectable_generator: ^2.6.2
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
